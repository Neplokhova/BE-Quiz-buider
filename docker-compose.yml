services:
  postgres:
    image: postgres:16-alpine
    container_name: quiz_builder_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quiz_builder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quiz_builder"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
